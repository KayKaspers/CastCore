name: docs-check

on:
  pull_request:
    paths:
      - "docs/**"
      - "scripts/check_docs.py"
      - ".github/workflows/docs-check.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/check_docs.py"

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate docs (structure, DE/EN parity, manifest) and regenerate status/nav
        run: python scripts/check_docs.py

      - name: Fail if generated docs metadata is out of date
        run: |
          if ! git diff --quiet -- docs/docs-status.json docs/nav.json; then
            echo "::error::docs-status.json or nav.json is out of date. Run 'python scripts/check_docs.py' and commit the result."
            git --no-pager diff -- docs/docs-status.json docs/nav.json
            exit 1
          fi

      - name: Check for broken internal docs links
        run: |
          python - <<'PY'
          import re, sys
          from pathlib import Path
          root = Path(".")
          bad = []
          for md in root.glob("docs/{de,en}/**/*.md".replace("{de,en}", "*")):
              for m in re.finditer(r"\]\((/docs/[^)#]+\.md)", md.read_text(encoding="utf-8", errors="replace")):
                  target = root / m.group(1).lstrip("/")
                  if not target.is_file():
                      bad.append(f"{md}: -> {m.group(1)}")
          if bad:
              print("Broken internal doc links:")
              print("\n".join(bad))
              sys.exit(1)
          print("internal doc links OK")
          PY

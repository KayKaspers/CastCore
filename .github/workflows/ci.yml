name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff · mypy · pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: castcore
          POSTGRES_PASSWORD: castcore
          POSTGRES_DB: castcore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Integration tests use a separate test database on the service above.
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: castcore
      POSTGRES_PASSWORD: castcore
      TEST_DB_NAME: castcore_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend (with dev extras)
        run: pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check app

      - name: Mypy (type check)
        run: mypy

      - name: Pytest (unit + API integration)
        run: pytest -q

  frontend:
    name: Frontend (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build

  docs:
    name: Docs (structure · parity · links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate docs and regenerate status/nav
        run: python scripts/check_docs.py

      - name: Fail if generated docs metadata is out of date
        run: |
          if ! git diff --quiet -- docs/docs-status.json docs/nav.json; then
            echo "::error::docs-status.json or nav.json is out of date. Run 'python scripts/check_docs.py' and commit the result."
            git --no-pager diff -- docs/docs-status.json docs/nav.json
            exit 1
          fi

      - name: Check for broken internal docs links
        run: |
          python - <<'PY'
          import re, sys
          from pathlib import Path
          root = Path(".")
          bad = []
          for md in root.glob("docs/*/**/*.md"):
              parts = md.parts
              if "docs" not in parts:
                  continue
              if parts[parts.index("docs") + 1] not in ("de", "en"):
                  continue
              for m in re.finditer(r"\]\((/docs/[^)#]+\.md)", md.read_text(encoding="utf-8", errors="replace")):
                  target = root / m.group(1).lstrip("/")
                  if not target.is_file():
                      bad.append(f"{md}: -> {m.group(1)}")
          if bad:
              print("Broken internal doc links:")
              print("\n".join(bad))
              sys.exit(1)
          print("internal doc links OK")
          PY

  compose:
    name: Docker Compose config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        env:
          SECRET_KEY: ci-dummy-secret
          ENCRYPTION_KEY: ci-dummy-encryption-key
          POSTGRES_PASSWORD: ci-dummy-db-password
        run: docker compose config --quiet && echo "compose config valid"

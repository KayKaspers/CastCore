# Alternative reverse proxy for operators who already run Nginx (instead of Caddy).
# Terminates TLS and proxies API + WebSocket to the backend, everything else to the SPA.
# Obtain certificates separately (e.g. certbot) and point ssl_certificate at them.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name castcore.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name castcore.example.com;

    ssl_certificate     /etc/letsencrypt/live/castcore.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/castcore.example.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;  # frontend (built SPA)
        proxy_set_header Host $host;
    }
}

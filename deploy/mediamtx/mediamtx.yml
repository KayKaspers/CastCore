# Optional MediaMTX media router for CastCore (compose profile: mediamtx).
# Role split: MediaMTX routes/proxies protocols (RTSP/RTMP/SRT/WebRTC/HLS),
# FFmpeg transcodes/packages, CastCore is the control plane.
# Enable in .env: MEDIAMTX_ENABLED=true and run `docker compose --profile mediamtx up -d`.

logLevel: info
api: yes
apiAddress: :9997

# The API/metrics ports are only reachable on the internal "castcore" Docker network
# (never published to the host), so the control plane is allowed to query them. Publishing
# and playback remain open for ingest clients on the LAN. Tighten this with real users if
# you expose MediaMTX beyond the host.
authInternalUsers:
  - user: any
    pass:
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
      - action: metrics

# Ingest / delivery endpoints
rtsp: yes
rtmp: yes
hls: yes
srt: yes
webrtc: yes

# Paths are managed dynamically by CastCore via the MediaMTX API in Phase 4.
paths:
  all_others:

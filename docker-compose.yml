# ============================================================================
# CastCore — Docker-first deployment
#
#   docker compose up -d                          # core suite
#   docker compose --profile mediamtx up -d       # + MediaMTX media router
#   docker compose --profile monitoring up -d     # + node/process exporters
#
# All persistent state lives under the named volumes below.
# ============================================================================

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  CASTCORE_ENV: ${CASTCORE_ENV:-production}
  DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-de}
  TZ: ${TZ:-Europe/Berlin}
  SECRET_KEY: ${SECRET_KEY}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-30}
  REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-14}
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
  RATE_LIMIT_AUTH_ATTEMPTS: ${RATE_LIMIT_AUTH_ATTEMPTS:-10}
  RATE_LIMIT_AUTH_WINDOW_SECONDS: ${RATE_LIMIT_AUTH_WINDOW_SECONDS:-300}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-castcore}
  POSTGRES_USER: ${POSTGRES_USER:-castcore}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  DATA_DIR: ${DATA_DIR:-/data}
  MEDIA_DIR: ${MEDIA_DIR:-/data/media}
  RECORDINGS_DIR: ${RECORDINGS_DIR:-/data/recordings}
  LOG_DIR: ${LOG_DIR:-/data/logs}
  BACKUP_DIR: ${BACKUP_DIR:-/data/backups}
  MOUNT_DIR: ${MOUNT_DIR:-/data/mounts}
  THUMBNAIL_DIR: ${THUMBNAIL_DIR:-/data/thumbnails}
  FFMPEG_PATH: ${FFMPEG_PATH:-/usr/bin/ffmpeg}
  FFPROBE_PATH: ${FFPROBE_PATH:-/usr/bin/ffprobe}
  PREFLIGHT_REQUIRED_BEFORE_START: ${PREFLIGHT_REQUIRED_BEFORE_START:-false}
  PREFLIGHT_BLOCK_ON_RED: ${PREFLIGHT_BLOCK_ON_RED:-false}
  PREFLIGHT_REPORT_TTL_SECONDS: ${PREFLIGHT_REPORT_TTL_SECONDS:-600}
  SAFE_MEDIA_PROCESSING_ENABLED: ${SAFE_MEDIA_PROCESSING_ENABLED:-true}
  MEDIA_AUTOTHUMBNAILS_ENABLED: ${MEDIA_AUTOTHUMBNAILS_ENABLED:-true}
  BLOCK_RISKY_CODECS: ${BLOCK_RISKY_CODECS:-true}
  RISKY_CODECS_BLOCKLIST: ${RISKY_CODECS_BLOCKLIST:-magicyuv}
  MEDIAMTX_ENABLED: ${MEDIAMTX_ENABLED:-false}
  MEDIAMTX_API_URL: ${MEDIAMTX_API_URL:-http://mediamtx:9997}
  MEDIAMTX_RTSP_URL: ${MEDIAMTX_RTSP_URL:-rtsp://mediamtx:8554}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
  YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
  YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
  TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
  TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}

x-data-volume: &data-volume
  - castcore_data:/data

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-castcore}
      POSTGRES_USER: ${POSTGRES_USER:-castcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - castcore_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-castcore} -d ${POSTGRES_DB:-castcore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [castcore]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - castcore_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [castcore]

  backend:
    build:
      context: ./backend
      args:
        FFMPEG_VARIANT: ${FFMPEG_VARIANT:-copy}
        FFMPEG_IMAGE: ${FFMPEG_IMAGE:-mwader/static-ffmpeg:8.1.2@sha256:33f770f812cbfc3de96c547157fc9faf8bd95a36481753439ffa761045167585}
        FFMPEG_STATIC_URL: ${FFMPEG_STATIC_URL:-}
        FFMPEG_STATIC_SHA256: ${FFMPEG_STATIC_SHA256:-}
    restart: unless-stopped
    environment: *common-env
    volumes: *data-volume
    # Hardening: block privilege escalation. (cap_drop is omitted here because optional
    # in-container CIFS/NFS mounts need CAP_SYS_ADMIN; prefer host-side mounts.)
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/v1/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [castcore]

  # Long-running supervisor for FFmpeg stream processes (NOT a task queue).
  process-manager:
    build:
      context: ./process_manager
      args:
        FFMPEG_VARIANT: ${FFMPEG_VARIANT:-copy}
        FFMPEG_IMAGE: ${FFMPEG_IMAGE:-mwader/static-ffmpeg:8.1.2@sha256:33f770f812cbfc3de96c547157fc9faf8bd95a36481753439ffa761045167585}
        FFMPEG_STATIC_URL: ${FFMPEG_STATIC_URL:-}
        FFMPEG_STATIC_SHA256: ${FFMPEG_STATIC_SHA256:-}
    restart: unless-stopped
    environment: *common-env
    volumes: *data-volume
    # SYS_ADMIN + /dev/fuse only needed if you mount rclone/cifs inside the container.
    # Prefer host-side mounts; see docs/DEPLOYMENT.md.
    # Hardening: block privilege escalation for the service that spawns FFmpeg.
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [castcore]

  # Short async jobs: media scan, ffprobe, thumbnails, backups.
  worker:
    build:
      context: ./worker
      args:
        FFMPEG_VARIANT: ${FFMPEG_VARIANT:-copy}
        FFMPEG_IMAGE: ${FFMPEG_IMAGE:-mwader/static-ffmpeg:8.1.2@sha256:33f770f812cbfc3de96c547157fc9faf8bd95a36481753439ffa761045167585}
        FFMPEG_STATIC_URL: ${FFMPEG_STATIC_URL:-}
        FFMPEG_STATIC_SHA256: ${FFMPEG_STATIC_SHA256:-}
    restart: unless-stopped
    environment: *common-env
    volumes: *data-volume
    # Hardening: the worker needs no Linux capabilities — drop them all and block
    # privilege escalation. This is where untrusted media is analysed/thumbnailed.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [castcore]

  frontend:
    build: { context: ./frontend }
    restart: unless-stopped
    # Mount the Markdown docs read-only so the in-app /docs viewer can fetch them.
    # Served under /docs-content (NOT /docs, which is the SPA route).
    volumes:
      - ./docs:/usr/share/nginx/html/docs-content:ro
    networks: [castcore]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - castcore_caddy_data:/data
      - castcore_caddy_config:/config
    depends_on: [backend, frontend]
    networks: [castcore]

  # --- Optional: Prometheus metrics (profile: monitoring) ---
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - castcore_prom:/prometheus
    depends_on: [backend]
    networks: [castcore]

  # --- Optional: MediaMTX media router (profile: mediamtx) ---
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    profiles: ["mediamtx"]
    volumes:
      - ./deploy/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks: [castcore]

volumes:
  castcore_pg:
  castcore_redis:
  castcore_data:
  castcore_caddy_data:
  castcore_caddy_config:
  castcore_prom:

networks:
  castcore:
    driver: bridge

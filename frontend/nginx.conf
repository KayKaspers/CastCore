server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|svg|png|ico|webmanifest|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
